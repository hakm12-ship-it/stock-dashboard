# Render 무료 플랜은 15분 미사용 시 잠들어 첫 접속이 ~30초 느려짐.
# 10분마다 핑을 보내 깨어있게 유지한다.
# 단, Render 무료 한도(월 750 인스턴스 시간)를 아끼기 위해
# 한국시간 07:00~01:00(18시간)에만 핑 → 새벽엔 재움 (~558h/월).
name: Keep Render awake

on:
  schedule:
    # KST 07:00–01:00 = UTC 22:00–16:00
    - cron: '*/10 22-23 * * *'
    - cron: '*/10 0-15 * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS --max-time 60 https://stock-insight-zws6.onrender.com/api/health \
            && echo "awake" || echo "ping failed (server may be waking)"
